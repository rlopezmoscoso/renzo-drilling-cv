<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="blueprint-title blueprint-desc">
  <title id="blueprint-title">Technical drilling rig, BOP, casing program, and directional J-profile well blueprint</title>
  <desc id="blueprint-desc">Original engineering-style SVG illustration showing a detailed land drilling rig connected to a wellhead and BOP stack, nested casing strings, seven geological boundaries, and a vertical-to-J-profile directional wellbore with gridlines and restrained construction annotations.</desc>
